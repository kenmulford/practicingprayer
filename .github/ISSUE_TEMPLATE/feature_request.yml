name: Feature request
description: Suggest an improvement or new capability
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature. Please describe the problem you're trying to solve, not just the solution — that helps us think about alternatives.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the feature.
      placeholder: e.g. Allow grouping multiple cards into a "season" of prayer
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's hard or missing in your prayer practice today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you think the app should do.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      description: Other ways to solve the same problem you've thought about.
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform relevance
      description: Which platform should this apply to?
      options:
        - iOS
        - Android
        - Both
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: Screenshots, mockups, links, anything else helpful.
    validations:
      required: false
