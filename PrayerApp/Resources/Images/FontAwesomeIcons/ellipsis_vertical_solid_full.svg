<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!-- LIGHT-MODE variant: fill=#3F4A34 (Tertiary) so the icon is clearly dark against a light Shell navbar. The equivalent dark-mode variant with fill=#dce0d5 lives in ellipsis_vertical_solid_full_dark.svg; XAML picks between them via AppThemeBinding on ToolbarItem.IconImageSource. Explicit hex is required here because ToolbarItem does not accept child Behaviors (can't attach IconTintColorBehavior like Image does on Settings page), and Shell.ForegroundColor does not tint toolbar bitmap icons reliably on Android. --><path fill="#3F4A34" d="M432 256a48 48 0 1 0 -96 0 48 48 0 1 0 96 0zm-160 0a48 48 0 1 0 -96 0 48 48 0 1 0 96 0zM64 304a48 48 0 1 0 0-96 48 48 0 1 0 0 96z"/></svg>
